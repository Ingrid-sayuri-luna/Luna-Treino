<style>
html,body{overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
button,[role="button"]{touch-action:manipulation;}
input,select,textarea{font-size:16px!important;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
.nav{padding-bottom:calc(8px + env(safe-area-inset-bottom,0px))!important;}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0D0A1A;--su:#1A1530;--ca:#221E3A;--ac:#C084FC;--so:#E879F9;--tx:#FAF5FF;--mu:#8B7AA8;--glow:#C084FC;}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--tx);max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:90px;overflow-x:hidden;}
.glow-orb{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:320px;height:320px;background:radial-gradient(circle,var(--glow)14 0%,transparent 68%);pointer-events:none;z-index:0;transition:background 1s;}
.glow-orb2{position:fixed;bottom:-80px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,var(--so)0C 0%,transparent 70%);pointer-events:none;z-index:0;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--su);border-top:1px solid var(--ac)18;display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100;}
.nb{background:none;border:none;color:var(--mu);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Outfit',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 8px;}

.page{padding:20px 16px 10px;position:relative;z-index:1;}
.hidden{display:none!important;}

.ac{color:var(--ac);}
.mn{font-family:'JetBrains Mono',monospace;}
.bp{background:linear-gradient(135deg,var(--ac),var(--so));color:#fff;border:none;border-radius:14px;padding:14px 22px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;margin-top:6px;transition:all .2s;box-shadow:0 4px 20px var(--ac)35;}

.bg{background:var(--ac)14;color:var(--ac);border:1px solid var(--ac)28;border-radius:12px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;}
.bd{background:var(--su);color:var(--mu);border:1px solid var(--ac)12;border-radius:12px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;}
.inp{width:100%;background:var(--su);border:1px solid var(--ac)18;border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:.92rem;outline:none;}
.inp:focus{border-color:var(--ac)55;}

select.inp{appearance:none;cursor:pointer;}
textarea.inp{resize:none;line-height:1.65;}

.segbar{display:flex;gap:3px;margin:9px 0;}
.seg{height:6px;flex:1;border-radius:3px;}

.treino-card{background:var(--su);border:1px solid var(--ac)12;border-radius:18px;padding:16px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;}
.treino-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ac)50,transparent);}
.moti{background:linear-gradient(135deg,var(--ac)16,var(--so)10);border:1px solid var(--ac)20;border-radius:16px;padding:14px 16px;margin-bottom:12px;font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;line-height:1.6;}
.wod-card{background:linear-gradient(135deg,var(--su),var(--ca));border:1px solid var(--ac)18;border-radius:18px;padding:16px;margin-bottom:9px;cursor:pointer;}
.wod-diff{border-radius:50px;padding:3px 11px;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}

.diff-hard{background:#F8717118;color:#F87171;border:1px solid #F8717125;}
.prog-fill-bar{height:5px;background:var(--su);border-radius:3px;margin-top:9px;overflow:hidden;}

.luna-logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--ac),var(--so));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.version-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--ac)20,var(--so)15);border:1px solid var(--ac)30;border-radius:50px;padding:4px 12px;font-size:.7rem;font-weight:700;color:var(--ac);}
.astro-row{display:flex;gap:10px;margin-bottom:10px;}
.astro-item{flex:1;background:var(--su);border-radius:14px;padding:12px;text-align:center;border:1px solid var(--ac)10;}
.chart-area{background:var(--su);border-radius:14px;padding:16px;margin-bottom:10px;min-height:120px;display:flex;align-items:flex-end;gap:5px;}
.chart-bar{flex:1;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--ac),var(--so)80);min-height:8px;}
.phase-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;border:2px solid var(--ac)30;}
.ob-error{color:#F87171;font-size:.73rem;margin-top:4px;display:none;}
.ob-error.show{display:block;animation:obshake .3s ease;}
@keyframes obshake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.inp.ob-invalid{border-color:#F87171!important;background:rgba(248,113,113,.06)!important;}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--su);border-radius:22px 22px 0 0;padding:24px 20px 36px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}

<script>
var LUNA_KEYS = {
  PERFIL:  'luna_perfil_usuario',
  ALUNAS:  'luna_perfil_alunas',
  HIST:    'luna_treino_historico',
  DEUSA:   'luna_treino_deusa',
  BASEURL: 'luna_config_baseurl',
  CIDADE:  'luna_config_cidade',
  LOG:     function(d){ return 'luna_ciclo_log_'+d; },
  MANA:    function(t,i){ return 'luna_treino_mana_'+t+'_'+i; },
  AGENDA:  function(i){ return 'luna_treino_agenda_'+i; },
  REL:     function(i){ return 'luna_relatorios_aluna_'+i; },
};
(function migrarLocalStorage(){
  if(localStorage.getItem('luna_config_migrated_v2')) return;
  var m=[
    ['luna_p2',          LUNA_KEYS.PERFIL],
    ['luna_alunas2',     LUNA_KEYS.ALUNAS],
    ['luna_hist',        LUNA_KEYS.HIST],
    ['luna_baseurl',     LUNA_KEYS.BASEURL],
    ['luna_treino_deusa',LUNA_KEYS.DEUSA],
  ];
  m.forEach(function(p){
    var v=localStorage.getItem(p[0]);
    if(v!==null){localStorage.setItem(p[1],v);localStorage.removeItem(p[0]);}
  });
  Object.keys(localStorage).forEach(function(k){
    if(/^luna_t_\d{4}-\d{2}-\d{2}$/.test(k)){
      var d=k.replace('luna_t_','');
      localStorage.setItem(LUNA_KEYS.LOG(d),localStorage.getItem(k));
      localStorage.removeItem(k);
    }
    if(/^luna_mana_/.test(k)&&!k.startsWith('luna_treino_mana_')){
      localStorage.setItem(k.replace('luna_mana_','luna_treino_mana_'),localStorage.getItem(k));
      localStorage.removeItem(k);
    }
    if(/^luna_ag2_/.test(k)){
      var idx=k.replace('luna_ag2_','');
      localStorage.setItem(LUNA_KEYS.AGENDA(idx),localStorage.getItem(k));
      localStorage.removeItem(k);
    }
  });
  localStorage.setItem('luna_config_migrated_v2','true');
})();
var _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx){try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(_audioCtx.state==='suspended'){_audioCtx.resume();}
  return _audioCtx;
}
document.addEventListener('touchstart',function(){getAudioCtx();},{once:true,passive:true});
document.addEventListener('click',function(){getAudioCtx();},{once:true});
function beep(freq,dur,vol){
  var ctx=getAudioCtx();if(!ctx)return;
  try{
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq||660;o.type='sine';
    var t=ctx.currentTime;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol||0.4,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+(dur||0.2));
    o.start(t);o.stop(t+(dur||0.2)+0.05);
  }catch(e){}
}
function soundPhaseEnd(){beep(520,0.18,0.45);setTimeout(function(){beep(400,0.25,0.4);},220);}
function soundSetEnd(){beep(600,0.15,0.4);setTimeout(function(){beep(700,0.15,0.4);},180);setTimeout(function(){beep(800,0.2,0.45);},360);}
function soundWorkoutDone(){beep(660,0.15,0.5);setTimeout(function(){beep(880,0.15,0.5);},180);setTimeout(function(){beep(1100,0.15,0.5);},360);setTimeout(function(){beep(880,0.08,0.3);},520);setTimeout(function(){beep(1320,0.3,0.55);},580);}

function getSign(bd){
  if(!bd)return"Escorpião";
  var d=new Date(bd+"T12:00:00");
  var md=(d.getMonth()+1)*100+d.getDate();
  for(var i=0;i<SIGN_TABLE.length;i++){
    var r=SIGN_TABLE[i];
    if(md>=(r[1]*100+r[2])&&md<=(r[3]*100+r[4]))return r[0];
  }
  return"Capricórnio";
}
function julianDate(y,mo,d,hUTC){
  if(mo<=2){y-=1;mo+=12;}
  var A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(mo+1))+d+hUTC/24+B-1524.5;
}
function norm360(a){return((a%360)+360)%360;}
function getLua(bd){
  if(!bd)return"Peixes";
  var d=new Date(bd+"T12:00:00Z");
  var jd=julianDate(d.getUTCFullYear(),d.getUTCMonth()+1,d.getUTCDate(),12);
  var T=(jd-2451545.0)/36525;
  var L0=norm360(218.3164477+481267.88123421*T);
  var M=norm360(134.9633964+477198.8675055*T);
  var F=norm360(93.2720950+483202.0175233*T);
  var Ms=norm360(357.5291092+35999.0502909*T);
  var D=norm360(297.8501921+445267.1114034*T);
  var r=Math.PI/180;
  var dL=6.288774*Math.sin(M*r)+1.274027*Math.sin((2*D-M)*r)
        +0.658314*Math.sin(2*D*r)+0.213618*Math.sin(2*M*r)
        -0.185116*Math.sin(Ms*r)-0.114332*Math.sin(2*F*r)
        +0.058793*Math.sin((2*D-2*M)*r)+0.053322*Math.sin((2*D+M)*r)
        +0.045758*Math.sin((2*D-Ms)*r)-0.040923*Math.sin((Ms-M)*r)
        -0.034720*Math.sin(D*r)-0.030383*Math.sin((Ms+M)*r);
  var moonLon=norm360(L0+dL);
  return SIGN_NAMES[Math.floor(moonLon/30)%12];
}

// ONBOARDING — 4 steps (sem hora/local de nascimento)
// Steps: 0=Nome+Data, 1=Ciclo, 2=Saúde, 3=Jornada

function obClearErrors(){
  document.querySelectorAll('.ob-invalid').forEach(function(e){e.classList.remove('ob-invalid');});
  document.querySelectorAll('.ob-error').forEach(function(e){e.classList.remove('show');e.textContent='';});
}
function obShowError(inputId,msg){
  var el=document.getElementById(inputId);
  if(el){
    el.classList.add('ob-invalid');
    var err=document.getElementById(inputId+'-err');
    if(err){err.textContent=msg;err.classList.add('show');}
    el.focus();
  }
}
function obValidateStep(step){
  obClearErrors();
  if(step===0){
    if(!OB.nome.trim()||OB.nome.trim().length<2){obShowError('ob-nome','Nome obrigatório (mín. 2 caracteres)');return false;}
    if(!OB.bd){obShowError('ob-bd','Data de nascimento obrigatória');return false;}
    var age=getAge(OB.bd);
    if(age===null||age<10||age>100){obShowError('ob-bd','Data inválida (10–100 anos)');return false;}
  }
  if(step===1&&!OB.men){
    if(!OB.lp){obShowError('ob-lp','Data da última menstruação obrigatória');return false;}
    var lastP=new Date(OB.lp),hoje=new Date();
    var diff=Math.floor((hoje-lastP)/86400000);
    if(diff<0){obShowError('ob-lp','A data não pode ser no futuro');return false;}
    if(diff>400){obShowError('ob-lp','Data parece muito antiga (mais de 13 meses)');return false;}
  }
  return true;
}
function obNext(){if(!obValidateStep(obStep))return;obStep++;renderOnboard();}

function obUpdateSignDisplay(){
  var bd=document.getElementById('ob-bd');
  if(!bd)return;
  OB.bd=bd.value;
  var disp=document.getElementById('ob-sign-disp');
  if(!disp)return;
  if(!OB.bd){disp.innerHTML='';return;}
  var age=getAge(OB.bd);
  if(age===null||age<10||age>100){disp.innerHTML='';return;}
  var ds=getSign(OB.bd);
  var lua=getLua(OB.bd);
  disp.innerHTML='<div style="margin-top:12px">'
    +SIGNS[ds].e+' <span class="pill">Sol: '+ds+'</span>'
    +'<span class="pill so">🌙 Lua: '+lua+'</span>'
    +(age?'<span class="pill">'+age+' anos</span>':'')
    +'</div>';
}

function startRun(){
  timer.mode="active";timer.running=true;timer.phase="prep";timer.prepSecs=10;
  timer.phEl=0;timer.done=0;timer.el=0;
  clearInterval(timer.iid);
  timer.iid=setInterval(function(){
    if(timer.phase==="prep"){
      timer.prepSecs--;countdown3(timer.prepSecs+1);
      if(timer.prepSecs<=0){soundPhaseEnd();timer.phase="corrida";timer.phEl=0;}
      if(currentPage==="treino"&&tTab==="cronometro")renderTreino();
      return;
    }
    var phDur=(timer.phase==="corrida"?timer.runT:timer.walkT)*60;
    timer.phEl++;timer.el++;countdown3(phDur-timer.phEl+1);
    if(timer.phEl>=phDur){
      if(timer.phase==="caminhada"){timer.done++;if(timer.done>=timer.sets){clearInterval(timer.iid);timer.running=false;timer.mode="done";soundWorkoutDone();}else{soundSetEnd();timer.phase="corrida";}}
      else{soundPhaseEnd();timer.phase="caminhada";}
      timer.phEl=0;
    }
    if(currentPage==="treino"&&tTab==="cronometro")renderTreino();
  },1000);
}

  }

}

function renderCicloCalendario(){
  if(!P.lastPeriod) return "";
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var inicio=new Date(hoje.getFullYear(),hoje.getMonth(),1);
  var fim=new Date(hoje.getTime()+32*86400000);
  var cl=P.cicloLength||28,md=P.mensDur||5;
  var diasSemana=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  var cells=[],cur=new Date(inicio);
  while(cur<=fim){
    var diff=Math.floor((cur-new Date(P.lastPeriod))/86400000);
    var phase=null;
    if(diff>=0){
      var d=diff%cl,ov=Math.round(cl/2);
      if(d<md)phase={i:"🔴",c:"#F87171"};
      else if(d<ov-1)phase={i:"🌱",c:"#4ADE80"};
      else if(d<=ov+1)phase={i:"✨",c:"#FACC15"};
      else phase={i:"🌙",c:"#A78BFA"};
    }
    var isHoje=cur.toDateString()===hoje.toDateString();
    cells.push({date:new Date(cur),day:cur.getDate(),phase:phase,isHoje:isHoje,wday:cur.getDay()});
    cur.setDate(cur.getDate()+1);
  }
  var meses={};
  cells.forEach(function(c){
    var k=c.date.getFullYear()+"-"+(c.date.getMonth()+1);
    if(!meses[k]){meses[k]={label:c.date.toLocaleDateString("pt-BR",{month:"long",year:"numeric"}),cells:[],firstWday:c.wday};}
    meses[k].cells.push(c);
  });
  var html='<div class="card"><div class="ct">📅 Calendário do Ciclo</div>';
  Object.keys(meses).forEach(function(mk){
    var m=meses[mk];
    html+='<div style="margin-bottom:16px"><div style="font-size:.75rem;font-weight:700;color:var(--ac);text-transform:capitalize;margin-bottom:8px">'+m.label+'</div>';
    html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
    diasSemana.forEach(function(d){html+='<div style="font-size:.6rem;color:var(--mu);text-align:center;font-weight:700">'+d+'</div>';});
    html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
    for(var i=0;i<m.firstWday;i++)html+='<div></div>';
    m.cells.forEach(function(c){
      html+='<div style="aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;'
        +(c.isHoje?'border:2px solid var(--ac);background:var(--ac)20;':'background:'+(c.phase?c.phase.c+'15':'var(--su)')+'80;')
        +'padding:2px">'
        +'<div style="font-size:.65rem;line-height:1;'+(c.isHoje?'color:var(--ac);font-weight:800':'color:var(--tx)')+'">'+c.day+'</div>'
        +(c.phase?'<div style="font-size:.65rem;line-height:1">'+c.phase.i+'</div>':'')
        +'</div>';
    });
    html+='</div></div>';
  });
  html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">';
  [{i:"🔴",l:"Menstruação"},{i:"🌱",l:"Folicular"},{i:"✨",l:"Ovulação"},{i:"🌙",l:"Lútea"}].forEach(function(f){html+='<span style="font-size:.7rem;color:var(--mu)">'+f.i+' '+f.l+'</span>';});
  html+='</div></div>';
  return html;
}

function addAluna(){
  var nome=(document.getElementById("an-nome")||{}).value||"";
  var bd=(document.getElementById("an-bd")||{}).value||"";
  var lp=(document.getElementById("an-lp")||{}).value||"";
  var pat=(document.getElementById("an-pat")||{}).value||"";
  var men=document.getElementById("an-men")&&document.getElementById("an-men").classList.contains("on");
  nome=nome.trim();
  if(!nome){alert("Digite o nome da aluna");return;}
  ALUNAS.push({nome:nome,birthdate:bd,lastPeriod:lp,patologias:pat,menopausa:men});
  saveAlunas();selAluna=ALUNAS.length-1;selSemana=0;loadAgenda(selAluna);selDia=0;pTab="montar";renderPersonal();
}
function salvarDia(alunaIdx){
  if(!Object.keys(selExs).length){alert("Selecione ao menos 1 exercício");return;}
  if(!agendaData[selSemana])agendaData[selSemana]=[null,null,null,null,null,null,null];
  agendaData[selSemana][selDia]={cat:buildCat,exercicios:JSON.parse(JSON.stringify(selExs))};
  agenda=agendaData[selSemana];
  saveAgenda(alunaIdx);
  var prox=selDia;
  for(var i=1;i<=6;i++){var nx=(selDia+i)%7;if(!agenda[nx]||!Object.keys(agenda[nx].exercicios||{}).length){prox=nx;break;}}
  selDia=prox;buildCat=null;selExs={};
  renderPersonal();
}
function domToggleEx(el,eid,ex){
  var isSel=!!selExs[ex];
  if(isSel){
    delete selExs[ex];
    el.classList.remove("sel");
    var chk=document.getElementById(eid+"c");if(chk){chk.classList.remove("on");chk.textContent="";}
    var flds=document.getElementById(eid+"f");if(flds)flds.style.display="none";
  } else {
    selExs[ex]={series:"",reps:"",carga:"",descanso:"",biset:"",biset_reps:"",biset_carga:""};
    el.classList.add("sel");
    var chk=document.getElementById(eid+"c");if(chk){chk.classList.add("on");chk.textContent="✓";}
    var flds=document.getElementById(eid+"f");if(flds)flds.style.display="flex";
  }
  var n=Object.keys(selExs).length;
  var bar=document.getElementById("ex-count-bar"),num=document.getElementById("ex-count-num");
  if(bar)bar.style.display=n?"block":"none";if(num)num.textContent=n;
}
function setExF(ex,field,val){if(selExs[ex])selExs[ex][field]=val;}
function toggleBiset(ex,eid){var picker=document.getElementById("biset-picker-"+eid);if(picker){picker.style.display=picker.style.display==="none"?"block":"none";}}

function copyLink(url){
  _lastShareUrl=url;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){alert('Link copiado! 📋');});}
  else{var t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('Link copiado! 📋');}
}
function abrirWhatsApp(btn){
  var nome=btn.dataset.nome||'';
  var url=_lastShareUrl||'';
  var msg=encodeURIComponent('🌙 Olá '+nome+'! Aqui está seu treino da semana no Luna & Treino:\n'+url);
  window.open('https://wa.me/?text='+msg,'_blank');
}

function renderTreinoLink(data){
  _ALUNA_MODE=true;
  _ALUNA_DATA=data;

  // Montar perfil da aluna a partir dos dados do link
  var pr={
    nome: data.aluna||'Mana',
    birthdate: data.birthdate||'',
    menopausa: data.menopausa||false,
    reposicao: data.reposicao||false,
    doseReposicao: data.doseReposicao||'',
    cicloLength: data.cicloLength||28,
    mensDur: data.mensDur||5,
    lastPeriod: data.lastPeriod||'',
    patologias: data.patologias||'',
    metas: data.metas||'',
    versao: 'deusa'
  };

  // Salvar como perfil local (aluna usa o app normalmente)
  if(!P||!P.nome){
    P=pr; sv(LUNA_KEYS.PERFIL,P);
  }

  // Salvar treino deusa
  if(data.semanas&&data.semanas.length){
    sv(LUNA_KEYS.DEUSA, JSON.stringify(data.semanas));
  }

  LUA_SIGN=getLua(P.birthdate||pr.birthdate);
  applyTheme(getSign(P.birthdate||pr.birthdate)||'Touro');

  // Ocultar aba Personal
  var nbP=document.getElementById('nb-personal');
  if(nbP)nbP.style.display='none';

  document.getElementById('nav').style.display='flex';
  ['home','treino','ciclo','progresso','personal','onboard'].forEach(function(p){
    var el=document.getElementById('pg-'+p);if(el)el.classList.add('hidden');
  });
  goPage('home');
}

    +'💓 FC Média: '+hr+' bpm\n'
    +'⚡ Borg: '+borg+'/10\n'
    +'🦵 Dor: '+dor+'/10\n'
    +(ci?'🌀 Ciclo: '+ci.i+' '+ci.p+'\n':'')
    +(obs?'\n📝 '+obs:'');

    ?'https://wa.me/'+waNum.replace(/\D/g,'')+'?text='+encodeURIComponent(msg)
    :'https://wa.me/?text='+encodeURIComponent(msg);
  closeModal();
  window.open(url,'_blank');
}

function salvarRelatorio(alunaIdx){
  var data=(document.getElementById('rel-data')||{}).value||todayKey();
  var agua=parseInt((document.getElementById('rel-p-agua')||{}).value||0)||0;
  var hr=parseInt((document.getElementById('rel-p-hr')||{}).value||0)||0;
  var borg=parseInt((document.getElementById('rel-p-borg')||{}).value||0)||0;
  var dor=parseInt((document.getElementById('rel-p-dor')||{}).value||0)||0;
  var sono=(document.getElementById('rel-p-sono')||{}).value||'';
  var humor=(document.getElementById('rel-p-hum')||{}).value||'';
  var ciclo=(document.getElementById('rel-p-ciclo')||{}).value||'';
  var obs=((document.getElementById('rel-p-obs')||{}).value||'').trim();
  var rels=ld(LUNA_KEYS.REL(alunaIdx),[]);
  // Substitui se mesma data, senão adiciona
  var idx=rels.findIndex(function(r){return r.data===data;});
  var reg={data:data,agua:agua,hr:hr,borg:borg,dor:dor,sono:sono,humor:humor,ciclo:ciclo,obs:obs};
  if(idx>=0)rels[idx]=reg; else rels.push(reg);
  sv(LUNA_KEYS.REL(alunaIdx),rels);
  renderPersonal();
}
function deletarRelatorio(alunaIdx,idx){
  if(!confirm('Remover este registro?'))return;
  var rels=ld(LUNA_KEYS.REL(alunaIdx),[]);
  var ord=rels.slice().sort(function(a,b){return a.data>b.data?-1:1;});
  var reg=ord[idx];
  if(reg){var pos=rels.findIndex(function(r){return r.data===reg.data;});if(pos>=0)rels.splice(pos,1);}
  sv(LUNA_KEYS.REL(alunaIdx),rels);
  renderPersonal();
}

// ── Configuração de exercício de musculação ───────────────────
var _cfgExBase='', _cfgAngulo='—', _cfgMaterial='—';
function abrirConfigEx(nomeBase){
  _cfgExBase=nomeBase; _cfgAngulo='—'; _cfgMaterial='—';
  var modal=document.getElementById('cfg-ex-modal');
  if(!modal)return;
  var titulo=document.getElementById('cfg-ex-titulo');
  if(titulo)titulo.textContent='Configurar: '+nomeBase;
  // Reset botões
  ANGULOS.forEach(function(a){var b=document.getElementById('cfa-'+a.replace(/[^a-z]/gi,'_'));if(b){b.style.background=a==='—'?'var(--ac)18':'var(--su)';b.style.color=a==='—'?'var(--ac)':'var(--mu)';}});
  MATERIAIS.forEach(function(m){var b=document.getElementById('cfm-'+m.replace(/[^a-z]/gi,'_'));if(b){b.style.background=m==='—'?'var(--ac)18':'var(--su)';b.style.color=m==='—'?'var(--ac)':'var(--mu)';}});
  atualizarCfgPreview();
  ['cfg-series','cfg-reps','cfg-carga','cfg-desc'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  modal.style.display='flex';
}
function fecharConfigEx(){
  var modal=document.getElementById('cfg-ex-modal');
  if(modal)modal.style.display='none';
}
function cfgSelAngulo(a){
  _cfgAngulo=a;
  ANGULOS.forEach(function(x){var b=document.getElementById('cfa-'+x.replace(/[^a-z]/gi,'_'));if(b){b.style.background=x===a?'var(--ac)18':'var(--su)';b.style.color=x===a?'var(--ac)':'var(--mu)';}});
  atualizarCfgPreview();
}
function cfgSelMaterial(m){
  _cfgMaterial=m;
  MATERIAIS.forEach(function(x){var b=document.getElementById('cfm-'+x.replace(/[^a-z]/gi,'_'));if(b){b.style.background=x===m?'var(--ac)18':'var(--su)';b.style.color=x===m?'var(--ac)':'var(--mu)';}});
  atualizarCfgPreview();
}
function atualizarCfgPreview(){
  var prev=document.getElementById('cfg-preview');
  if(!prev)return;
  // Calcular instância
  var inst=contarInstancias(_cfgExBase,_cfgAngulo,_cfgMaterial)+1;
  prev.textContent=exKey(_cfgExBase,_cfgAngulo,_cfgMaterial,inst);
}
function contarInstancias(base,ang,mat){
  var chaveBase=exKey(base,ang,mat,1);
  var count=0;
  Object.keys(selExs).forEach(function(k){
    if(k===chaveBase||k===base||(k.indexOf(base+' ·')===0&&angMat(k,ang,mat)))count++;
  });
  return count;
}
function angMat(chave,ang,mat){
  var partes=chave.split(' · ');
  var aOk=ang==='—'||partes.indexOf(ang)>=0;
  var mOk=mat==='—'||partes.indexOf(mat)>=0;
  return aOk&&mOk;
}
function confirmarConfigEx(){
  var series=(document.getElementById('cfg-series')||{}).value||'';
  var reps=(document.getElementById('cfg-reps')||{}).value||'';
  var carga=(document.getElementById('cfg-carga')||{}).value||'';
  var desc=(document.getElementById('cfg-desc')||{}).value||'';
  var inst=contarInstancias(_cfgExBase,_cfgAngulo,_cfgMaterial)+1;
  var chave=exKey(_cfgExBase,_cfgAngulo,_cfgMaterial,inst);
  selExs[chave]={series:series,reps:reps,carga:carga,descanso:desc,angulo:_cfgAngulo,material:_cfgMaterial,base:_cfgExBase};
  fecharConfigEx();
  renderPersonal();
}
function removerExMusc(chave){
  delete selExs[chave];
  renderPersonal();
}
